name: Build & Release

on:
  push:
    tags:
      - "v*"          # 推送 tag（如 v1.0.0）时触发
  workflow_dispatch:  # 也可以在 GitHub 网页手动触发

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Install WebView2 (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://go.microsoft.com/fwlink/p/?LinkId=2124703 -OutFile WebView2Installer.exe
          Start-Process WebView2Installer.exe -ArgumentList '/silent /install' -Wait

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Clander ${{ github.ref_name }}"
          releaseBody: |
            ## 下载
            - **macOS (Intel)**: `Clander_x64.dmg`
            - **macOS (Apple Silicon)**: `Clander_aarch64.dmg`
            - **Windows**: `Clander_x64-setup.exe` 或 `Clander_x64_en-US.msi`

            ## 安装说明
            - macOS：打开 DMG，拖入 Applications 文件夹
            - Windows：运行 .exe 或 .msi 安装程序
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
